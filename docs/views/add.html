<section>
  <h1>Add bottle</h1>
  <p class="muted">Manual entry. (Tap <a href="#/manage">Manage</a> to scan a label instead.)</p>
  <form id="add-bottle-form">
    <label>Producer<input name="producer" required /></label>
    <label>Wine name (optional)<input name="wine_name" /></label>
    <label>Varietal
      <input name="varietal" list="varietal-options" required />
      <datalist id="varietal-options"></datalist>
    </label>
    <label>Vintage<input name="vintage" type="number" min="1900" max="2100" /></label>

    <div class="row">
      <label style="flex:1">Region<input name="region" /></label>
      <label style="flex:1">Country<input name="country" /></label>
    </div>

    <div class="row">
      <label style="flex:1">Style
        <select name="style" required></select>
      </label>
      <label style="flex:1">Sweetness
        <select name="sweetness">
          <option value="">—</option>
          <option value="bone_dry">bone_dry</option>
          <option value="dry">dry</option>
          <option value="off_dry">off_dry</option>
          <option value="sweet">sweet</option>
        </select>
      </label>
      <label style="flex:1">Body (1–5)<input name="body" type="number" min="1" max="5" /></label>
    </div>

    <div class="row">
      <label style="flex:1">Quantity<input name="quantity" type="number" min="0" value="1" /></label>
      <label style="flex:1">Storage location<input name="storage_location" placeholder="e.g. rack A, slot 3" /></label>
    </div>

    <div class="row">
      <label style="flex:1">Acquired date<input name="acquired_date" type="date" /></label>
      <label style="flex:1">Acquired price<input name="acquired_price" type="number" min="0" step="0.01" /></label>
    </div>

    <fieldset class="row" style="border:1px solid var(--surface-2); padding:0.6rem; border-radius: var(--radius);">
      <legend>Drink window (auto from varietal+vintage; override if you disagree)</legend>
      <label style="flex:1">Start year<input name="drink_window_start" type="number" min="1900" max="2200" /></label>
      <label style="flex:1">End year<input name="drink_window_end" type="number" min="1900" max="2200" /></label>
      <p id="window-hint" class="muted" style="flex-basis:100%; margin: 0.25rem 0 0;"></p>
    </fieldset>

    <label>Notes<textarea name="notes" rows="3"></textarea></label>

    <div class="row">
      <button type="submit">Save bottle</button>
      <a href="#/manage" class="btn ghost" style="display:inline-block; padding:0.5rem 1rem; border:1px solid var(--surface-2); border-radius:var(--radius);">Cancel</a>
    </div>
  </form>
</section>
