<section class="scan-view" id="scan-view" data-stage="intent">

  <div class="scan-stage-pane" data-pane="intent">
    <h1>Manage</h1>
    <div class="manage-grid">
      <div class="manage-col">
        <h2>Add a bottle</h2>
        <button data-action="start-add">Scan label</button>
        <a class="btn ghost manage-link" href="#/add">Enter manually</a>
      </div>
      <div class="manage-col">
        <h2>Pour a bottle</h2>
        <button data-action="start-pour">Scan to identify</button>
        <a class="btn ghost manage-link" href="#/cellar">Pick from cellar</a>
      </div>
    </div>
    <ul id="scan-queue-tray" class="scan-queue-tray" hidden></ul>
  </div>

  <div class="scan-stage-pane" data-pane="capture" hidden>
    <p class="muted scan-prompt">Snap the front label</p>
    <div class="scan-camera">
      <video id="scan-video" playsinline muted></video>
    </div>
    <div class="row">
      <button data-action="capture">Capture</button>
      <button data-action="cancel" class="ghost">Cancel</button>
    </div>
  </div>

  <div class="scan-stage-pane" data-pane="review" hidden>
    <p class="muted scan-prompt">Use this shot?</p>
    <img id="scan-preview" class="scan-preview-img" alt="Preview of captured photo" />
    <div class="row" id="scan-review-actions"></div>
  </div>

  <div class="scan-stage-pane" data-pane="uploading" hidden>
    <p class="muted">Uploading…</p>
  </div>

  <div class="scan-stage-pane" data-pane="waiting" hidden>
    <p class="muted">Identifying… (typically 20–40s with your sommelier)</p>
  </div>

  <div class="scan-stage-pane" data-pane="result" hidden>
    <div id="scan-result"></div>
  </div>

  <div class="scan-stage-pane" data-pane="error" hidden>
    <p class="error" id="scan-error"></p>
    <div class="row">
      <button data-action="restart">Try again</button>
      <a href="#/manage" class="btn ghost" style="display:inline-block; padding:0.5rem 1rem; border:1px solid var(--surface-2); border-radius:var(--radius);">Back</a>
    </div>
  </div>

</section>
