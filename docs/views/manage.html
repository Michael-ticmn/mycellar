<section class="scan-view" id="scan-view" data-stage="intent">

  <div class="scan-stage-pane" data-pane="intent">
    <h1>Manage</h1>
    <div class="manage-grid">
      <div class="manage-col">
        <h2>Add a bottle</h2>
        <button data-action="start-add">Scan label</button>
        <a class="btn ghost manage-link" href="#/add">Enter manually</a>
      </div>
      <div class="manage-col">
        <h2>Pour a bottle</h2>
        <button data-action="start-pour">Scan to identify</button>
        <a class="btn ghost manage-link" href="#/cellar">Pick from cellar</a>
      </div>
    </div>
    <ul id="scan-queue-tray" class="scan-queue-tray" hidden></ul>
  </div>

  <div class="scan-stage-pane" data-pane="capture" hidden>
    <p class="muted scan-prompt">Snap the front label</p>
    <div class="scan-camera">
      <video id="scan-video" playsinline muted></video>
    </div>
    <div class="row">
      <button data-action="capture">Capture</button>
      <button data-action="cancel" class="ghost">Cancel</button>
    </div>
  </div>

  <div class="scan-stage-pane" data-pane="review" hidden>
    <p class="muted scan-prompt">Use this shot?</p>
    <img id="scan-preview" class="scan-preview-img" alt="Preview of captured photo" />
    <div class="row" id="scan-review-actions"></div>
  </div>

  <div class="scan-stage-pane" data-pane="uploading" hidden>
    <p class="muted">Uploading…</p>
  </div>

  <div class="scan-stage-pane" data-pane="waiting" hidden>
    <div class="pour-loader" role="status" aria-live="polite">
      <svg class="pour-loader-svg" viewBox="0 0 36 36" aria-hidden="true" focusable="false">
        <defs>
          <clipPath id="pour-bowl-clip-wait"><path d="M16 21 h11 l-1.3 5.5 a5.2 5.2 0 0 1 -8.4 0 z" /></clipPath>
        </defs>
        <g transform="rotate(-50 14 14)" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
          <path d="M11 3 h6 v3 c1 0.4 1.4 1.5 1.4 3 v8 a1.4 1.4 0 0 1 -1.4 1.4 h-6 a1.4 1.4 0 0 1 -1.4 -1.4 v-8 c0 -1.5 0.4 -2.6 1.4 -3 z" />
        </g>
        <circle cx="18" cy="17" r="0.9" fill="currentColor" opacity="0">
          <animate attributeName="cy" values="16;22" dur="0.9s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite" />
        </circle>
        <circle cx="19" cy="17" r="0.7" fill="currentColor" opacity="0">
          <animate attributeName="cy" values="16;23" dur="0.9s" begin="0.3s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;1;0" dur="0.9s" begin="0.3s" repeatCount="indefinite" />
        </circle>
        <rect clip-path="url(#pour-bowl-clip-wait)" fill="currentColor" opacity="0.85" x="15" width="13" y="27" height="0">
          <animate attributeName="y" values="27;21.5;21.5;27" dur="2.4s" keyTimes="0;0.6;0.8;1" repeatCount="indefinite" />
          <animate attributeName="height" values="0;5.5;5.5;0" dur="2.4s" keyTimes="0;0.6;0.8;1" repeatCount="indefinite" />
        </rect>
        <path d="M16 21 h11 l-1.3 5.5 a5.2 5.2 0 0 1 -8.4 0 z M21.5 30.4 V34 M19 34 h6"
              fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" />
      </svg>
      <p class="muted pour-loader-msg">Identifying… (typically 20–40s with your sommelier)</p>
    </div>
  </div>

  <div class="scan-stage-pane" data-pane="result" hidden>
    <div id="scan-result"></div>
  </div>

  <div class="scan-stage-pane" data-pane="error" hidden>
    <p class="error" id="scan-error"></p>
    <div class="row">
      <button data-action="restart">Try again</button>
      <a href="#/manage" class="btn ghost" style="display:inline-block; padding:0.5rem 1rem; border:1px solid var(--surface-2); border-radius:var(--radius);">Back</a>
    </div>
  </div>

</section>
