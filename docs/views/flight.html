<section>
  <h1>Flight builder</h1>
  <p class="muted">Tell your sommelier a theme; they'll order 3–5 bottles from your cellar into a teaching flight.</p>
  <form id="flight-form">
    <label>Theme
      <select name="theme">
        <option value="vertical">Vertical (same wine, different vintages)</option>
        <option value="horizontal">Horizontal (same vintage, different producers)</option>
        <option value="varietal_comparison">Varietal comparison</option>
        <option value="regional_tour">Regional tour</option>
        <option value="surprise_me">Surprise me</option>
      </select>
    </label>
    <div class="row">
      <label style="flex:1">Guests<input name="guests" type="number" min="1" value="4" /></label>
      <label style="flex:1">Length
        <select name="length">
          <option value="3">3 bottles</option>
          <option value="5">5 bottles</option>
        </select>
      </label>
    </div>
    <button type="submit">Build flight</button>
  </form>
  <div id="flight-result"></div>

  <hr style="border-color: var(--surface-2); margin: 2rem 0;" />

  <h2>Round out the cellar</h2>
  <p class="muted">Suggest 1–2 wines you don't have that would meaningfully expand what flights you could build.</p>
  <form id="flight-extras-form">
    <label>Theme or constraint (optional)
      <input name="theme_hint" placeholder="e.g. fill out my Burgundy collection, more Old World whites" />
    </label>
    <button type="submit">Suggest additions</button>
  </form>
  <div id="flight-extras-result"></div>
</section>
