<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0f0f" />
  <title>cellar27</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="cellar27" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="css/styles.css" />
  <!-- Version: single source for app + SW. Bumping forces an update. -->
  <script src="version.js"></script>
  <!-- Public config (committed) sets defaults. config.local.js (gitignored)
       optionally overrides for local dev — its 404 on the deployed site
       is harmless. -->
  <script src="config.public.js"></script>
  <script src="config.local.js" onerror="this.remove()"></script>
  <!-- Supabase JS v2 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="#/cellar" class="brand">cellar<span class="num">27</span><span class="version" id="app-version" aria-label="App version"></span></a>
    <nav>
      <a href="#/add"        data-route="add">Add</a>
      <a href="#/scan"       data-route="scan">Scan</a>
      <a href="#/pairing"    data-route="pairing">Pair</a>
      <a href="#/flight"     data-route="flight">Flight</a>
      <a href="#/drink-now"  data-route="drink-now">Drink&nbsp;now</a>
    </nav>
    <span class="userbox">
      <span id="user-email" class="muted"></span>
      <button id="signout-btn" class="ghost" aria-label="Sign out">
        <span class="long">Sign out</span>
        <span class="short" aria-hidden="true">Out</span>
      </button>
    </span>
  </header>

  <main id="app-view" hidden>
    <div id="main"></div>
  </main>

  <section id="auth-view" class="auth-view">
    <div class="auth-card">
      <h1>cellar<span class="num">27</span></h1>
      <p class="muted">Personal cellar. Sign in to continue.</p>
      <form id="signin-form">
        <label>Email <input name="email" type="email" autocomplete="email" required /></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required /></label>
        <div class="row">
          <button type="submit">Sign in</button>
          <button type="button" id="signup-btn" class="ghost">Sign up</button>
        </div>
        <p id="auth-error" class="error"></p>
      </form>
    </div>
  </section>

  <div id="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
