<!doctype html>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0f0f" />
  <!-- Strip the URL fragment from outbound Referer headers so guest tokens
       in #/guest/<token> don't leak to any external link a sommelier
       response might include. -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>cellar27</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="cellar27" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="css/styles.css" />
  <!-- Version: single source for app + SW. Bumping forces an update. -->
  <script src="version.js"></script>
  <!-- Public config (committed) sets defaults. config.local.js (gitignored)
       optionally overrides for local dev — loaded dynamically by app.js so
       its 404 on the deployed site is silent and we don't need an inline
       onerror handler (which would block any future CSP). -->
  <script src="config.public.js"></script>
  <!-- Supabase JS v2 from CDN. Pinned to a specific version + SRI hash so a
       compromised jsDelivr (or a coffee-shop MitM) can't swap the bundle
       and exfiltrate guest share tokens from the URL. To upgrade: pick a
       new version, fetch the FILE (not the auto-minified .min.js — jsdelivr
       re-minifies those per request and warns against SRI on them), and
       recompute the hash:
         curl -sL https://cdn.jsdelivr.net/npm/@supabase/supabase-js@<v>/dist/umd/supabase.js \
           | openssl dgst -sha384 -binary | base64 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/dist/umd/supabase.js"
          integrity="sha384-pNDx8ebKKncqRMS1aZKjmB1T1jdd6psogvE0+sPrwW/Sy94M6geGuQpYXQnLCdRq"
          crossorigin="anonymous"></script>
  <!-- QR code generator (vendored, used by the Share view) -->
  <script src="vendor/qrcode.min.js"></script>
</head>

    <span class="userbox">
      <span id="user-email" class="muted"></span>
    </span>
  </header>

  <main id="app-view" hidden>
    <div id="main"></div>
  </main>

  <section id="auth-view" class="auth-view">
    <div class="auth-card">
      <h1>cellar<span class="num">27</span></h1>
      <p class="muted">Personal cellar. Sign in to continue.</p>
      <form id="signin-form">
        <label>Email <input name="email" type="email" autocomplete="email" required /></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required /></label>
        <div class="row">
          <button type="submit">Sign in</button>
          <button type="button" id="signup-btn" class="ghost">Sign up</button>
        </div>
        <p id="auth-error" class="error"></p>
      </form>
    </div>
  </section>

  <div id="toast" hidden></div>

  <div id="voice-picker" hidden role="dialog" aria-label="Read-aloud voice settings">
    <header class="voice-picker-head">
      <h3>Read-aloud voice</h3>
      <button type="button" id="voice-picker-close" class="ghost" aria-label="Close">✕</button>
    </header>
    <label class="voice-en-only-row">
      <input type="checkbox" id="voice-en-only" checked />
      <span>English voices only</span>
    </label>
    <ul id="voice-list" class="voice-list" role="radiogroup" aria-label="Available voices"></ul>
    <label class="voice-rate-row">
      <span>Speed <span id="voice-rate-display" class="muted"></span></span>
      <input type="range" id="voice-rate" min="0.7" max="1.3" step="0.05" />
    </label>
    <div class="row voice-picker-actions">
      <button type="button" id="voice-test">Test</button>
    </div>
  </div>

  <script type="module" src="js/dist/app.bundle.js"></script>

</html>
